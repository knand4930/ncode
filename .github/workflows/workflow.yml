name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build project
      run: npm run build

    - name: Run tests
      run: npm test

  type-check:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: TypeScript type check
      run: npx tsc --noEmit

  python-service:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: pip install -r python-ai-service/requirements.txt

    - name: Install lint tools
      run: pip install pylint flake8

    - name: Lint
      run: |
        flake8 python-ai-service/ --count --select=E9,F63,F7,F82 --show-source --exclude=python-ai-service/.venv
        pylint python-ai-service/ --disable=all --enable=E,F --ignore=.venv,__pycache__
      continue-on-error: true

    - name: Run tests
      run: python -m pytest python-ai-service/ -v --ignore=python-ai-service/.venv
      continue-on-error: true
